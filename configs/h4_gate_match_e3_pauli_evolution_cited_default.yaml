experiment:
  name: h4_gate_match_e3_pauli_evolution_cited_default
  seed: 7
  output_dir: runs/h4_gate_match_e3_pauli_evolution_cited_default

molecule:
  name: H4
  bond_length_angstrom: 0.88
  basis: 6-31g
  active_electrons: 4
  active_orbitals: 4
  geometry: linear_chain

operator_pool:
  spec: pauli_evolution
  sequence_length: 20
  excitation_angle: 0.7853981633974483
  include_noop: true
  ccsd_threshold: 0.000001
  remove_z_ladder: true
  only_use_first_pauli: true
  dedupe_pauli_words: true

qsci:
  shots: 1000
  dmax: 100
  add_hf_det: true
  backend: cudaq
  cudaq_target: qpp-cpu
  cudaq_option: null
  cudaq_reverse_bitstrings: false

model:
  d_model: 64
  n_layers: 2
  n_heads: 4
  latent_dim: 12
  qkan_layers: 1
  daruan_terms: 4
  dropout: 0.0

training:
  iterations: 2
  batch_circuits: 4
  policy_updates: 2
  learning_rate: 0.000005
  weight_decay: 0.01
  grpo_clip: 0.2
  repetition_penalty: 1.2
  temperature: 1.0
  device: cpu
